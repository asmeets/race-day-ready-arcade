# Site Settings
title: "Driven by STEM"
subtitle: "F1 x Mercedes x Microsoft MakeCode Arcade Project"
description: "A classroom-ready MakeCode Arcade racing game that teaches middle school students about engineering tradeoffs, sustainability, and STEM careers through F1-inspired gameplay."
url: "https://asmeets.github.io"
baseurl: "/driven-by-stem"
repository: "asmeets/driven-by-stem"

# Theme Settings
remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site Author
author:
  name: "Driven by STEM Team"
  bio: "F1 x Mercedes x Microsoft STEM Education Initiative"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/asmeets/driven-by-stem"
    - label: "Play the Game"
      icon: "fas fa-fw fa-gamepad"
      url: "https://arcade.makecode.com/--skillmap#github:asmeets/driven-by-stem/skillmap"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: America/New_York

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

# Custom Variables for F1 Mercedes Branding
brand:
  primary_color: "#00D2BE"  # Mercedes Petronas Teal
  secondary_color: "#00847A"  # Dark Teal
  accent_color: "#00D2BE"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/asmeets/driven-by-stem"
    - label: "Play the Game"
      icon: "fas fa-fw fa-gamepad"
      url: "https://arcade.makecode.com/--skillmap#github:asmeets/driven-by-stem/skillmap"
